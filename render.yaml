services:
  - type: web
    name: nova-era-api
    runtime: node
    buildCommand: >
      corepack enable &&
      pnpm install &&
      pnpm --filter @workspace/nova-era-admin run build &&
      pnpm --filter @workspace/api-server run build &&
      cp -r artifacts/nova-era-admin/dist/public artifacts/api-server/dist/public
    startCommand: sh startup.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
